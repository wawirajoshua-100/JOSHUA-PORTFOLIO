<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Portfolio | Wawira Joshua Nyaga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

        <!-- Firebase SDKs (Compat Version) -->
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- Link to CSS -->
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>
<!-- BACKGROUND IMAGE -->
<!-- Make sure "IMAGES" matches your actual folder name exactly (case-sensitive) -->
<img src="IMAGES/jkuat.jpg"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.8;">

<!-- Dark Overlay to make text readable -->
<div
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); z-index: -1;">
</div>

    <!-- Main Content -->
    <div class="relative z-10 min-h-screen">
        <!-- Header -->
        <header class="border-b border-[var(--border)] backdrop-blur-md bg-[var(--bg)]/80 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-3">
                            <!-- JKUAT LOGO: Replace src below -->
                            <img id="jkuatLogo" src="IMAGES/logo.png"
                                alt="JKUAT Logo" class="h-12 w-auto hidden sm:block">
                            <div class="border-l border-[var(--border)] pl-3 h-full flex flex-col justify-center">
                                <h1 class="text-lg font-bold tracking-tight text-[var(--fg)]">CS EXAM PORTFOLIO</h1>
                                <p class="text-xs font-mono text-[var(--accent)]">KNQF LEVEL 6</p>
                            </div>
                        </div>
                    </div>

                <!-- New Login/Logout Button Area -->
                <div class="flex items-center gap-3">
                    <button id="authBtn" onclick="handleAuthClick()" class="btn-primary flex items-center gap-2">
                        <!-- Default Icon (Login) -->
                        <svg id="loginIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                        </svg>
                        <!-- Default Text (Login) -->
                        <span id="authText" class="hidden sm:inline">Login to Upload</span>
                    </button>
                </div>
                        <button onclick="openUploadModal()" class="btn-primary flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4v16m8-8H4" />
                            </svg>
                            <span class="hidden sm:inline">Upload Paper</span>
                            <span class="sm:hidden">Add</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Hero Section -->
        <section class="py-12 px-4">
            <div class="max-w-7xl mx-auto">
                <div class="card p-8 relative overflow-hidden">
                    <div class="flex flex-col md:flex-row gap-8 items-center relative z-10">

                        <!-- Profile Image -->
                        <div class="relative">
                            <div class="w-32 h-32 rounded-full border-4 border-[var(--accent)] p-1">
                                <!-- PROFILE PICTURE: Replace src below -->
                                <img id="myProfilePic" src="IMAGES/myprofile.jpeg"
                                    alt="Wawira Joshua" class="w-full h-full rounded-full object-cover">
                            </div>
                            <div
                                class="absolute bottom-0 right-0 w-8 h-8 bg-[var(--accent)] rounded-full flex items-center justify-center">
                                <svg class="w-4 h-4 text-[var(--bg)]" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                        </div>

                        <!-- Bio Info -->
                        <div class="flex-1 text-center md:text-left">
                            <div class="flex items-center gap-2 mb-2 bg-[var(--bg-elevated)] px-3 py-1 rounded-lg w-fit"
                                style="border: 1px solid var(--border);">
                                <div class="w-2 h-2 rounded-full bg-red-500"></div>
                                <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                                <div class="w-2 h-2 rounded-full bg-green-500"></div>
                                <span class="ml-2 text-xs font-mono text-[var(--muted)]">student_profile.config</span>
                            </div>

                            <h2 class="text-3xl md:text-4xl font-bold mb-2">
                                WAWIRA JOSHUA <span class="text-[var(--accent)]">NYAGA</span>
                            </h2>
                            <p class="text-[var(--muted)] max-w-xl mb-4">
                                Student ID: <span class="text-[var(--fg)] font-mono">TDC113-C002-0003/2024</span>
                            </p>

                            <div class="flex flex-wrap gap-4 text-sm justify-center md:justify-start">
                                <div class="flex items-center gap-2 bg-[var(--bg-elevated)] px-3 py-2 rounded-lg">
                                    <div class="w-2 h-2 rounded-full bg-[var(--accent)] pulse-accent"></div>
                                    <span id="totalPapers">0</span> Papers Archived
                                </div>
                                <div class="flex items-center gap-2 bg-[var(--bg-elevated)] px-3 py-2 rounded-lg">
                                    <div class="w-2 h-2 rounded-full bg-cyan-400"></div>
                                    <span id="totalUnits">0</span> Units Covered
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Module Navigation -->
        <section class="px-4 mb-8">
            <div class="max-w-7xl mx-auto">
                <div class="flex flex-wrap gap-2 semester-tabs">
                    <button class="semester-tab active rounded-lg font-mono" data-semester="1"
                        onclick="switchSemester(1)">Module I</button>
                    <button class="semester-tab rounded-lg font-mono" data-semester="2"
                        onclick="switchSemester(2)">Module II</button>
                    <button class="semester-tab rounded-lg font-mono" data-semester="3"
                        onclick="switchSemester(3)">Module III</button>
                    <button class="semester-tab rounded-lg font-mono" data-semester="4"
                        onclick="switchSemester(4)">Module IV</button>
                    <button class="semester-tab rounded-lg font-mono" data-semester="5"
                        onclick="switchSemester(5)">Module V</button>
                    <button class="semester-tab rounded-lg font-mono" data-semester="6"
                        onclick="switchSemester(6)">Module VI</button>
                </div>
            </div>
        </section>

        <!-- Content Area -->
        <main class="px-4 pb-12">
            <div class="max-w-7xl mx-auto">
                <div id="semesterContent"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="border-t border-[var(--border)] py-8 px-4 relative z-10">
            <div class="max-w-7xl mx-auto text-center text-sm text-[var(--muted)]">
                <p class="font-mono mb-2">JKUAT KAREN CAMPUS | Computer Science Level 6</p>
                <p>Admission No: <span class="text-[var(--accent)]">TDC113-C002-0003/2024</span></p>
            </div>
        </footer>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal-content max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold">Upload Exam Paper</h3>
                <button onclick="closeUploadModal()" class="text-[var(--muted)] hover:text-[var(--fg)]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <form id="uploadForm" onsubmit="handleUpload(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Module</label>
                        <select id="uploadSemester" required
                            class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-lg px-4 py-3 text-[var(--fg)]"
                            onchange="populateUnits()">
                            <option value="">Select Module</option>
                            <option value="1">Module I</option>
                            <option value="2">Module II</option>
                            <option value="3">Module III</option>
                            <option value="4">Module IV</option>
                            <option value="5">Module V</option>
                            <option value="6">Module VI</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Unit Name</label>
                        <select id="uploadUnitCode" required
                            class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-lg px-4 py-3 text-[var(--fg)]">
                            <option value="">Select Module First</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Exam Type</label>
                            <select id="uploadType" required
                                class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-lg px-4 py-3 text-[var(--fg)]">
                                <option value="cat1">CAT 1</option>
                                <option value="cat2">CAT 2</option>
                                <option value="mock">Mock Exam</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Mode</label>
                            <select id="uploadMode" required
                                class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-lg px-4 py-3 text-[var(--fg)]">
                                <option value="theory">Theory</option>
                                <option value="practical">Practical</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Score (Optional)</label>
                        <input type="text" id="uploadScore" placeholder="e.g., 85%"
                            class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-lg px-4 py-3 text-[var(--fg)] placeholder:text-[var(--muted)]">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">File (PDF or JPEG)</label>
                        <div id="dropZone" class="upload-zone" onclick="document.getElementById('fileInput').click()">
                            <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" class="hidden"
                                onchange="handleFileSelect(event)">
                            <svg class="w-12 h-12 mx-auto mb-3 text-[var(--muted)]" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                            <p class="text-[var(--muted)]" id="fileLabel">Drag & drop or click to select</p>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="closeUploadModal()" class="btn-secondary flex-1">Cancel</button>
                    <button type="submit" class="btn-primary flex-1">Upload</button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Modal -->
    <div id="viewModal" class="modal-overlay" onclick="closeViewModal()">
        <div class="modal-content max-w-4xl" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-4">
                <h3 id="viewTitle" class="text-xl font-bold">Paper Preview</h3>
                <button onclick="closeViewModal()" class="text-[var(--muted)] hover:text-[var(--fg)]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="viewContent" class="bg-[var(--bg)] rounded-lg overflow-hidden"></div>
        </div>
    </div>

    <!-- Link to JavaScript -->
    <script src="JS/script.js"></script>
</body>

</html>
